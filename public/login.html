<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理平台 - 登录</title>
    <link rel="stylesheet" href="/style.css?v=67" />
  </head>
  <body class="login-page">
    <div class="login-page-bg" aria-hidden="true"></div>
    <main class="login-page-main">
      <div class="login-page-brand">
        <div class="login-page-mark" aria-hidden="true"></div>
        <h1 class="login-page-title">管理平台</h1>
        <p class="login-page-tagline">请输入凭据以继续</p>
      </div>

      <section class="login-page-card" aria-label="登录">
        <div class="login-page-fields">
          <div class="field login-page-field">
            <label for="loginUser">账号</label>
            <input id="loginUser" type="text" autocomplete="username" placeholder="用户名" />
          </div>
          <div class="field login-page-field">
            <label for="loginPass">密码</label>
            <input id="loginPass" type="password" autocomplete="current-password" placeholder="密码" />
          </div>
        </div>
        <div class="login-page-actions">
          <button id="loginBtn" type="button" class="login-page-submit">登录</button>
        </div>
        <div id="loginHint" class="login-page-hint" role="status" aria-live="polite"></div>
      </section>
    </main>

    <script type="module" src="/login.js?v=3"></script>
  </body>
</html>
