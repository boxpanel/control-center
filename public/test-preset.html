<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>预设选择器测试</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            border-bottom: 2px solid #4f46e5;
            padding-bottom: 10px;
        }
        .test-section {
            margin-bottom: 40px;
            padding: 20px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #f9fafb;
        }
        .test-section h2 {
            color: #4f46e5;
            margin-top: 0;
        }
        .field {
            margin-bottom: 20px;
        }
        .field label {
            display: block;
            margin-bottom: 5px;
            color: #6b7280;
            font-weight: 500;
        }
        .field select {
            width: 100%;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            background: white;
        }
        .results {
            margin-top: 30px;
            padding: 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .results h3 {
            margin-top: 0;
            color: #334155;
        }
        .result-item {
            margin-bottom: 15px;
            padding: 10px;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
        }
        .status {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: 500;
        }
        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }
        .status.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>预设选择器测试</h1>
        
        <div class="test-section">
            <h2>测试预设选择器</h2>
            <p>这个页面测试设备参数配置页面中的预设选择器是否正常工作。</p>
            
            <div class="field">
                <label for="presetSelect">参数分类:</label>
                <select id="presetSelect">
                    <option value="">请选择...</option>
                    <option value="deviceInfo">设备信息</option>
                    <option value="ftpConfig">FTP配置</option>
                    <option value="namingRules">命名规则</option>
                </select>
            </div>
            
            <button onclick="testPreset()" style="padding: 10px 20px; background: #4f46e5; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer;">
                测试预设
            </button>
        </div>
        
        <div id="status" class="status info">
            准备测试，请选择预设并点击测试按钮。
        </div>
        
        <div class="results">
            <h3>测试结果</h3>
            <div id="presetInfo"></div>
        </div>
    </div>

    <script>
        // 模拟app.js中的预设定义
        const DEVICE_PREVIEW_ISAPI_PRESETS = {
            deviceInfo: { label: "设备信息", schema: "deviceInfo" },
            ftpConfig: { label: "FTP配置", schema: "ftpConfig" },
            namingRules: { label: "命名规则", schema: "namingRules" }
        };

        const DEVICE_PREVIEW_ISAPI_SCHEMAS = {
            deviceInfo: {
                readOnly: true,
                method: "GET",
                fields: [
                    { key: "deviceName", label: "设备名称", type: "text", readOnly: true },
                    { key: "model", label: "型号", type: "text", readOnly: true },
                    { key: "serialNumber", label: "序列号", type: "text", readOnly: true }
                ]
            },
            ftpConfig: {
                readOnly: true,
                method: "SDK",
                fields: [
                    { key: "ftpEnabled", label: "FTP启用状态", type: "text", readOnly: true },
                    { key: "ftpServer", label: "FTP服务器地址", type: "text", readOnly: true },
                    { key: "ftpPort", label: "FTP端口", type: "text", readOnly: true },
                    { key: "ftpUsername", label: "FTP用户名", type: "text", readOnly: true },
                    { key: "ftpPassword", label: "FTP密码", type: "text", readOnly: true },
                    { key: "ftpDirectory", label: "FTP目录", type: "text", readOnly: true },
                    { key: "ftpUploadMode", label: "上传模式", type: "text", readOnly: true },
                    { key: "ftpUploadInterval", label: "上传间隔(秒)", type: "text", readOnly: true },
                    { key: "ftpImageQuality", label: "图片质量", type: "text", readOnly: true },
                    { key: "ftpImageResolution", label: "图片分辨率", type: "text", readOnly: true }
                ]
            },
            namingRules: {
                readOnly: true,
                method: "SDK",
                fields: [
                    { key: "namingRule", label: "命名规则", type: "text", readOnly: true },
                    { key: "timeFormat", label: "时间格式", type: "text", readOnly: true },
                    { key: "includeCameraName", label: "包含摄像头名称", type: "text", readOnly: true },
                    { key: "includePlateNumber", label: "包含车牌号码", type: "text", readOnly: true },
                    { key: "includeTimestamp", label: "包含时间戳", type: "text", readOnly: true },
                    { key: "fileExtension", label: "文件扩展名", type: "text", readOnly: true },
                    { key: "maxFileNameLength", label: "最大文件名长度", type: "text", readOnly: true },
                    { key: "prefix", label: "前缀", type: "text", readOnly: true },
                    { key: "suffix", label: "后缀", type: "text", readOnly: true },
                    { key: "example", label: "示例", type: "text", readOnly: true }
                ]
            }
        };

        function updateStatus(message, type = 'info') {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status ${type}`;
        }

        function testPreset() {
            const presetSelect = document.getElementById('presetSelect');
            const presetKey = presetSelect.value;
            
            if (!presetKey) {
                updateStatus('请选择一个预设', 'error');
                return;
            }
            
            const preset = DEVICE_PREVIEW_ISAPI_PRESETS[presetKey];
            const schema = DEVICE_PREVIEW_ISAPI_SCHEMAS[preset.schema];
            
            if (!preset || !schema) {
                updateStatus(`未找到预设: ${presetKey}`, 'error');
                return;
            }
            
            updateStatus(`预设测试成功: ${preset.label}`, 'success');
            
            // 显示预设信息
            const presetInfo = document.getElementById('presetInfo');
            presetInfo.innerHTML = `
                <div class="result-item">
                    <h4>预设信息</h4>
                    <p><strong>预设键:</strong> ${presetKey}</p>
                    <p><strong>预设标签:</strong> ${preset.label}</p>
                    <p><strong>Schema键:</strong> ${preset.schema}</p>
                    <p><strong>方法:</strong> ${schema.method}</p>
                    <p><strong>只读:</strong> ${schema.readOnly ? '是' : '否'}</p>
                    <p><strong>字段数量:</strong> ${schema.fields.length}</p>
                </div>
                <div class="result-item">
                    <h4>字段列表</h4>
                    <ul>
                        ${schema.fields.map(field => `<li><strong>${field.label}</strong> (${field.key}) - 类型: ${field.type}, 只读: ${field.readOnly ? '是' : '否'}</li>`).join('')}
                    </ul>
                </div>
            `;
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('预设测试页面已加载');
            updateStatus('预设测试页面已就绪', 'info');
        });
    </script>
</body>
</html>
